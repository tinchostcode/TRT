<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>ReactionFit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface-2: #1a1a26;
  --accent: #ff3d3d;
  --accent-glow: rgba(255, 61, 61, 0.3);
  --green: #00e676;
  --green-glow: rgba(0, 230, 118, 0.3);
  --yellow: #ffd600;
  --yellow-glow: rgba(255, 214, 0, 0.25);
  --text: #f0f0f5;
  --text-dim: #8888a0;
  --radius: 16px;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
body { display: flex; flex-direction: column; }

/* NAV */
.nav { display: flex; justify-content: center; gap: 4px; padding: 12px 16px 8px; background: var(--bg); position: relative; z-index: 100; }
.nav-btn { flex: 1; max-width: 180px; padding: 10px 0; border: none; background: var(--surface); color: var(--text-dim); font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; border-radius: 12px; cursor: pointer; transition: all 0.3s; }
.nav-btn.active { background: var(--accent); color: #fff; box-shadow: 0 4px 20px var(--accent-glow); }

/* PAGES */
.page { flex: 1; display: none; flex-direction: column; overflow-y: auto; padding: 16px; }
.page.active { display: flex; }

/* COMMON */
.config-row { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border-radius: var(--radius); padding: 14px 18px; }
.config-row label { font-size: 15px; color: var(--text-dim); letter-spacing: 0.5px; }
.config-row .value-control { display: flex; align-items: center; gap: 12px; }
.config-row .value-control span { font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 700; min-width: 44px; text-align: center; }
.btn-pm { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--accent); background: transparent; color: var(--accent); font-size: 22px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-family: 'Rajdhani', sans-serif; }
.btn-pm:active { background: var(--accent); color: #fff; }
.section-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 3px; color: var(--text-dim); margin: 4px 0; }
.btn-main { width: 100%; padding: 16px; border: none; border-radius: var(--radius); font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; cursor: pointer; transition: all 0.25s; }
.btn-start { background: var(--accent); color: #fff; box-shadow: 0 6px 24px var(--accent-glow); }
.btn-start:active { transform: scale(0.97); }

/* TABATA CONFIG */
.tabata-config { display: flex; flex-direction: column; gap: 12px; padding-bottom: 16px; }

/* TABATA DISPLAY */
.tabata-display { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 6px; text-align: center; position: relative; }
.tabata-display.active { display: flex; }
.tabata-phase { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 6px; text-transform: uppercase; }
.tabata-phase.trabajo { color: var(--accent); text-shadow: 0 0 30px var(--accent-glow); }
.tabata-phase.descanso { color: var(--green); text-shadow: 0 0 30px var(--green-glow); }
.tabata-phase.preparacion { color: var(--yellow); text-shadow: 0 0 30px var(--yellow-glow); }
.tabata-time { font-family: 'Orbitron', monospace; font-size: 96px; font-weight: 900; line-height: 1; }
.tabata-info { font-size: 16px; color: var(--text-dim); letter-spacing: 1px; margin-top: 2px; }
.tabata-info strong { color: var(--text); font-family: 'Orbitron', monospace; font-size: 15px; }
.tabata-progress { width: 85%; max-width: 320px; height: 6px; background: var(--surface-2); border-radius: 3px; margin-top: 12px; overflow: hidden; }
.tabata-progress-bar { height: 100%; border-radius: 3px; transition: width 0.3s linear; }
.tabata-total { font-size: 13px; color: var(--text-dim); letter-spacing: 1px; margin-top: 6px; }
.tabata-controls { display: flex; gap: 12px; margin-top: 20px; width: 80%; max-width: 320px; }
.tabata-controls button { flex: 1; padding: 14px 0; border: none; border-radius: var(--radius); font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; cursor: pointer; transition: all 0.2s; }
.btn-pause { background: var(--yellow); color: #0a0a0f; }
.btn-pause.paused { background: var(--green); color: #fff; box-shadow: 0 4px 16px var(--green-glow); }
.btn-cancel { background: var(--surface-2); color: var(--text-dim); }

/* REACTION CONFIG */
.reaction-config { display: flex; flex-direction: column; gap: 12px; padding-bottom: 16px; }
.color-grid { display: flex; flex-wrap: wrap; gap: 10px; padding: 8px 0; }
.color-chip { width: 48px; height: 48px; border-radius: 12px; border: 3px solid transparent; cursor: pointer; transition: all 0.2s; position: relative; }
.color-chip.selected { border-color: #fff; transform: scale(1.1); }
.color-chip.selected::after { content: '✓'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
.interval-config { display: flex; align-items: center; gap: 10px; background: var(--surface); border-radius: var(--radius); padding: 14px 18px; }
.interval-config label { font-size: 14px; color: var(--text-dim); flex-shrink: 0; }
.interval-config input[type=range] { flex: 1; accent-color: var(--accent); height: 6px; }
.interval-config .val { font-family: 'Orbitron', monospace; font-size: 16px; font-weight: 700; min-width: 36px; text-align: right; }

.toggle-row { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border-radius: var(--radius); padding: 14px 18px; }
.toggle-row label { font-size: 15px; color: var(--text-dim); }
.toggle-switch { width: 50px; height: 28px; background: var(--surface-2); border-radius: 14px; border: none; cursor: pointer; position: relative; transition: background 0.3s; }
.toggle-switch.on { background: var(--accent); }
.toggle-switch::after { content: ''; position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; background: #fff; border-radius: 50%; transition: transform 0.3s; }
.toggle-switch.on::after { transform: translateX(22px); }

/* REACTION DISPLAY */
.reaction-display { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; border-radius: 24px; transition: background-color 0.15s; position: relative; margin: -16px; padding: 16px; }
.reaction-display.active { display: flex; }
.reaction-color-name { font-family: 'Bebas Neue', sans-serif; font-size: 64px; letter-spacing: 8px; color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,0.5); text-transform: uppercase; animation: pulseIn 0.3s ease-out; }
.reaction-stats { position: absolute; top: 24px; right: 24px; text-align: right; color: rgba(255,255,255,0.7); font-size: 14px; }
.reaction-stats span { font-family: 'Orbitron', monospace; font-weight: 700; font-size: 18px; display: block; color: #fff; }
.reaction-waiting { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 4px; color: rgba(255,255,255,0.6); animation: breathe 2s ease-in-out infinite; }
.reaction-controls { position: absolute; bottom: 24px; left: 24px; right: 24px; display: flex; gap: 12px; }
.reaction-controls button { flex: 1; padding: 14px 0; border: none; border-radius: var(--radius); font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; cursor: pointer; }

/* SUMMARY */
.summary-overlay { position: fixed; inset: 0; background: rgba(10,10,15,0.95); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 32px; text-align: center; }
.summary-overlay.active { display: flex; }
.summary-title { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 6px; color: var(--green); text-shadow: 0 0 20px var(--green-glow); }
.summary-stats { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 300px; }
.summary-stat { background: var(--surface); border-radius: var(--radius); padding: 16px; display: flex; justify-content: space-between; align-items: center; }
.summary-stat label { font-size: 14px; color: var(--text-dim); }
.summary-stat span { font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 700; }
.btn-close-summary { margin-top: 12px; padding: 14px 48px; border: none; border-radius: var(--radius); background: var(--accent); color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; cursor: pointer; }

/* OVERLAYS */
.flash-overlay { position: fixed; inset: 0; z-index: 150; display: none; align-items: center; justify-content: center; }
.flash-overlay.active { display: flex; }
.countdown-overlay { position: fixed; inset: 0; z-index: 180; display: none; align-items: center; justify-content: center; background: rgba(10,10,15,0.92); }
.countdown-overlay.active { display: flex; }
.countdown-number { font-family: 'Orbitron', monospace; font-size: 140px; font-weight: 900; color: var(--accent); text-shadow: 0 0 60px var(--accent-glow); animation: pulseIn 0.5s ease-out; }

/* ICON ROW */
.icon-row { position: absolute; top: 24px; left: 24px; display: flex; gap: 8px; }
.icon-btn { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.icon-btn.off { opacity: 0.4; }

/* ANIMATIONS */
@keyframes pulseIn { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
@keyframes breathe { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

.page::-webkit-scrollbar { width: 4px; }
.page::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 2px; }
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="switchPage('tabata', this)">TABATA</button>
  <button class="nav-btn" onclick="switchPage('reaction', this)">REACCIÓN</button>
</nav>

<!-- TABATA PAGE -->
<div class="page active" id="page-tabata">
  <div class="tabata-config" id="tabata-config">
    <div class="section-title">⏱ CONFIGURACIÓN</div>
    <div class="config-row"><label>EJERCICIOS</label><div class="value-control"><button class="btn-pm" onclick="adj('exercises',-1)">−</button><span id="v-exercises">4</span><button class="btn-pm" onclick="adj('exercises',1)">+</button></div></div>
    <div class="config-row"><label>SERIES</label><div class="value-control"><button class="btn-pm" onclick="adj('series',-1)">−</button><span id="v-series">2</span><button class="btn-pm" onclick="adj('series',1)">+</button></div></div>
    <div class="config-row"><label>TRABAJO (seg)</label><div class="value-control"><button class="btn-pm" onclick="adj('work',-5)">−</button><span id="v-work">20</span><button class="btn-pm" onclick="adj('work',5)">+</button></div></div>
    <div class="config-row"><label>DESCANSO (seg)</label><div class="value-control"><button class="btn-pm" onclick="adj('rest',-5)">−</button><span id="v-rest">10</span><button class="btn-pm" onclick="adj('rest',5)">+</button></div></div>
    <div class="config-row"><label>DESCANSO ENTRE SERIES (seg)</label><div class="value-control"><button class="btn-pm" onclick="adj('seriesRest',-5)">−</button><span id="v-seriesRest">60</span><button class="btn-pm" onclick="adj('seriesRest',5)">+</button></div></div>
    <div class="config-row"><label>PREPARACIÓN (seg)</label><div class="value-control"><button class="btn-pm" onclick="adj('prepare',-1)">−</button><span id="v-prepare">5</span><button class="btn-pm" onclick="adj('prepare',1)">+</button></div></div>
    <div class="tabata-total" id="tabata-total-time" style="text-align:center;padding:8px 0;font-size:15px;color:var(--text-dim);"></div>
    <button class="btn-main btn-start" onclick="startTabataCountdown()">COMENZAR</button>
  </div>
  <div class="tabata-display" id="tabata-display">
    <div class="tabata-phase" id="tabata-phase">PREPARACIÓN</div>
    <div class="tabata-time" id="tabata-time">5</div>
    <div class="tabata-info" id="tabata-info"></div>
    <div class="tabata-progress"><div class="tabata-progress-bar" id="tabata-bar"></div></div>
    <div class="tabata-total" id="tabata-elapsed"></div>
    <div class="tabata-controls">
      <button class="btn-pause" id="btn-tabata-pause" onclick="togglePauseTabata()">PAUSA</button>
      <button class="btn-cancel" onclick="stopTabata()">SALIR</button>
    </div>
  </div>
</div>

<!-- REACTION PAGE -->
<div class="page" id="page-reaction">
  <div class="reaction-config" id="reaction-config">
    <div class="section-title">🎨 COLORES ACTIVOS (mín. 2)</div>
    <div class="color-grid" id="color-grid"></div>
    <div class="interval-config"><label>INTERVALO</label><input type="range" min="1" max="8" step="0.5" value="3" id="interval-range" oninput="updateIntervalLabel()"><div class="val" id="interval-val">3s</div></div>
    <div class="config-row"><label>DURACIÓN (min)</label><div class="value-control"><button class="btn-pm" onclick="adjReaction('duration',-1)">−</button><span id="v-duration">3</span><button class="btn-pm" onclick="adjReaction('duration',1)">+</button></div></div>
    <div class="toggle-row"><label>VOZ (dice el color)</label><button class="toggle-switch on" id="toggle-voice" onclick="this.classList.toggle('on')"></button></div>
    <div class="toggle-row"><label>VIBRACIÓN</label><button class="toggle-switch on" id="toggle-vibration" onclick="this.classList.toggle('on')"></button></div>
    <div class="toggle-row"><label>ALEATORIO (varía intervalo)</label><button class="toggle-switch" id="toggle-random" onclick="this.classList.toggle('on')"></button></div>
    <button class="btn-main btn-start" onclick="startReactionCountdown()">COMENZAR</button>
  </div>
  <div class="reaction-display" id="reaction-display">
    <div class="icon-row"><button class="icon-btn" id="r-sound-btn" onclick="toggleReactionSound()">🔊</button></div>
    <div class="reaction-stats"><div>CAMBIOS<span id="r-changes">0</span></div><div style="margin-top:8px">TIEMPO<span id="r-time">3:00</span></div></div>
    <div id="reaction-content"></div>
    <div class="reaction-controls">
      <button class="btn-pause" id="btn-reaction-pause" onclick="togglePauseReaction()">PAUSA</button>
      <button class="btn-cancel" onclick="stopReaction()">SALIR</button>
    </div>
  </div>
</div>

<!-- OVERLAYS -->
<div class="flash-overlay" id="flash-overlay"></div>
<div class="countdown-overlay" id="countdown-overlay"><div class="countdown-number" id="countdown-number">3</div></div>
<div class="summary-overlay" id="summary-overlay">
  <div class="summary-title" id="summary-title">¡TERMINADO!</div>
  <div class="summary-stats" id="summary-stats"></div>
  <button class="btn-close-summary" onclick="closeSummary()">CERRAR</button>
</div>

<script>
// ===== AUDIO =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx, soundEnabled = true;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
function beep(freq, dur, type='sine') {
  if (!soundEnabled) return; ensureAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
}
function beepWork() { beep(880,0.15); setTimeout(()=>beep(880,0.15),180); }
function beepRest() { beep(440,0.3); }
function beepTick() { beep(660,0.08); }
function beepDone() { beep(1200,0.12); setTimeout(()=>{beep(1400,0.12);setTimeout(()=>beep(1600,0.3),140);},140); }
function beepColor() { beep(600,0.1,'square'); }
function beepCountdown() { beep(700,0.12); }
function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }

// ===== TTS =====
function speak(text) {
  if (!document.getElementById('toggle-voice').classList.contains('on')) return;
  const u = new SpeechSynthesisUtterance(text); u.lang='es-AR'; u.rate=1.3; u.volume=1;
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}

// ===== NAV =====
function switchPage(page, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  btn.classList.add('active');
}

// ===== COUNTDOWN 3-2-1 =====
function showCountdown(cb) {
  const ov = document.getElementById('countdown-overlay'), n = document.getElementById('countdown-number');
  let c = 3; ov.classList.add('active'); n.textContent = c; beepCountdown();
  const iv = setInterval(()=>{
    c--;
    if (c > 0) { n.textContent=c; n.style.animation='none'; n.offsetHeight; n.style.animation='pulseIn 0.5s ease-out'; beepCountdown(); }
    else { clearInterval(iv); ov.classList.remove('active'); beepWork(); cb(); }
  }, 1000);
}

function flashScreen(color) {
  const o = document.getElementById('flash-overlay'); o.style.background=color; o.classList.add('active');
  setTimeout(()=>o.classList.remove('active'),250);
}

function fmtTime(s) { return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

// ===== SUMMARY =====
function showSummary(title, stats) {
  document.getElementById('summary-title').textContent = title;
  document.getElementById('summary-stats').innerHTML = stats.map(s=>
    `<div class="summary-stat"><label>${s.label}</label><span>${s.value}</span></div>`
  ).join('');
  document.getElementById('summary-overlay').classList.add('active');
}
function closeSummary() { document.getElementById('summary-overlay').classList.remove('active'); }

// ===== TABATA =====
const T = { exercises:4, series:2, work:20, rest:10, seriesRest:60, prepare:5 };
const TL = { exercises:[1,20], series:[1,10], work:[5,180], rest:[5,120], seriesRest:[10,180], prepare:[3,15] };
let tabataTimer=null, tabataPaused=false, tabataElapsed=0;

function adj(k, d) {
  const [mn,mx]=TL[k]; T[k]=Math.max(mn,Math.min(mx,T[k]+d));
  document.getElementById('v-'+k).textContent=T[k]; updateTotalTime();
}

function updateTotalTime() {
  const t = T.prepare + T.series*(T.exercises*T.work + (T.exercises-1)*T.rest) + (T.series-1)*T.seriesRest;
  document.getElementById('tabata-total-time').innerHTML = `TIEMPO TOTAL: <strong style="color:var(--text);font-family:'Orbitron',monospace;">${fmtTime(t)}</strong>`;
}

function startTabataCountdown() {
  ensureAudio();
  document.getElementById('tabata-config').style.display='none';
  document.getElementById('tabata-display').classList.add('active');
  updateTabataUI('preparacion',T.prepare,1,T.exercises,1,T.series);
  showCountdown(startTabata);
}

function startTabata() {
  tabataPaused=false; tabataElapsed=0;
  document.getElementById('btn-tabata-pause').textContent='PAUSA';
  document.getElementById('btn-tabata-pause').classList.remove('paused');
  let phase='preparacion', ex=1, ser=1, timeLeft=T.prepare;
  updateTabataUI(phase,timeLeft,ex,T.exercises,ser,T.series);

  tabataTimer = setInterval(()=>{
    if (tabataPaused) return;
    timeLeft--; tabataElapsed++;
    if (timeLeft<=3 && timeLeft>0) beepTick();
    if (timeLeft<=0) {
      if (phase==='preparacion') {
        phase='trabajo'; timeLeft=T.work; beepWork(); vibrate([200,100,200]); flashScreen('#ff3d3d');
      } else if (phase==='trabajo') {
        if (ex>=T.exercises && ser>=T.series) {
          beepDone(); vibrate([300,100,300,100,300]);
          showSummary('¡TERMINADO!',[{label:'EJERCICIOS',value:T.exercises},{label:'SERIES',value:T.series},{label:'TIEMPO TOTAL',value:fmtTime(tabataElapsed)}]);
          stopTabata(); return;
        } else if (ex>=T.exercises) {
          phase='descanso_series'; timeLeft=T.seriesRest; beepRest(); vibrate(200); flashScreen('#00e676');
        } else {
          phase='descanso'; timeLeft=T.rest; beepRest(); vibrate(200); flashScreen('#00e676');
        }
      } else if (phase==='descanso') {
        ex++; phase='trabajo'; timeLeft=T.work; beepWork(); vibrate([200,100,200]); flashScreen('#ff3d3d');
      } else if (phase==='descanso_series') {
        ser++; ex=1; phase='trabajo'; timeLeft=T.work; beepWork(); vibrate([200,100,200]); flashScreen('#ff3d3d');
      }
    }
    updateTabataUI(phase,timeLeft,ex,T.exercises,ser,T.series);
  }, 1000);
}

function updateTabataUI(phase,time,ex,totalEx,ser,totalSer) {
  const labels={preparacion:'PREPARACIÓN',trabajo:'TRABAJO',descanso:'DESCANSO',descanso_series:'DESCANSO ENTRE SERIES'};
  const css={preparacion:'preparacion',trabajo:'trabajo',descanso:'descanso',descanso_series:'descanso'};
  const cols={preparacion:'var(--yellow)',trabajo:'var(--accent)',descanso:'var(--green)',descanso_series:'var(--green)'};
  document.getElementById('tabata-phase').textContent=labels[phase];
  document.getElementById('tabata-phase').className='tabata-phase '+css[phase];
  document.getElementById('tabata-time').textContent=time;
  document.getElementById('tabata-time').style.color=cols[phase];
  document.getElementById('tabata-info').innerHTML=`EJERCICIO <strong>${ex}/${totalEx}</strong> · SERIE <strong>${ser}/${totalSer}</strong>`;
  const mx=phase==='preparacion'?T.prepare:phase==='trabajo'?T.work:phase==='descanso'?T.rest:T.seriesRest;
  const pct=((mx-time)/mx)*100;
  const bar=document.getElementById('tabata-bar'); bar.style.width=pct+'%'; bar.style.background=cols[phase];
  document.getElementById('tabata-elapsed').textContent='TRANSCURRIDO: '+fmtTime(tabataElapsed);
}

function togglePauseTabata() {
  tabataPaused=!tabataPaused;
  const b=document.getElementById('btn-tabata-pause');
  b.textContent=tabataPaused?'REANUDAR':'PAUSA'; b.classList.toggle('paused',tabataPaused);
}

function stopTabata() {
  clearInterval(tabataTimer); tabataTimer=null; tabataPaused=false;
  document.getElementById('tabata-config').style.display='flex';
  document.getElementById('tabata-display').classList.remove('active');
}

// ===== REACTION =====
const COLORS = [
  {name:'ROJO',hex:'#ff3d3d'},{name:'AZUL',hex:'#3d7eff'},{name:'VERDE',hex:'#00e676'},
  {name:'AMARILLO',hex:'#ffd600'},{name:'NARANJA',hex:'#ff9100'},{name:'VIOLETA',hex:'#b040ff'},
  {name:'CELESTE',hex:'#00e5ff'},{name:'ROSA',hex:'#ff4081'},{name:'BLANCO',hex:'#f0f0f5'},
];
let selectedColors=[0,1,2,3], reactionTimers=[], reactionPaused=false, reactionDuration=3, reactionSoundOn=true;

function buildColorGrid() {
  const g=document.getElementById('color-grid'); g.innerHTML='';
  COLORS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='color-chip'+(selectedColors.includes(i)?' selected':'');
    d.style.background=c.hex; d.onclick=()=>toggleColor(i); g.appendChild(d);
  });
}
function toggleColor(i) {
  if (selectedColors.includes(i)) { if (selectedColors.length<=2) return; selectedColors=selectedColors.filter(x=>x!==i); }
  else selectedColors.push(i);
  buildColorGrid();
}
function adjReaction(k,d) { if(k==='duration'){reactionDuration=Math.max(1,Math.min(30,reactionDuration+d));document.getElementById('v-duration').textContent=reactionDuration;} }
function updateIntervalLabel() { document.getElementById('interval-val').textContent=document.getElementById('interval-range').value+'s'; }

function toggleReactionSound() {
  reactionSoundOn=!reactionSoundOn;
  const b=document.getElementById('r-sound-btn'); b.textContent=reactionSoundOn?'🔊':'🔇'; b.classList.toggle('off',!reactionSoundOn);
}

function startReactionCountdown() {
  ensureAudio(); if(selectedColors.length<2) return;
  document.getElementById('reaction-config').style.display='none';
  const d=document.getElementById('reaction-display');
  d.classList.add('active'); d.style.backgroundColor='#1a1a26';
  document.getElementById('reaction-content').innerHTML='<div class="reaction-waiting">PREPARATE...</div>';
  document.getElementById('r-changes').textContent='0';
  document.getElementById('r-time').textContent=fmtTime(reactionDuration*60);
  showCountdown(startReaction);
}

function startReaction() {
  reactionPaused=false;
  document.getElementById('btn-reaction-pause').textContent='PAUSA';
  document.getElementById('btn-reaction-pause').classList.remove('paused');
  const baseInt=parseFloat(document.getElementById('interval-range').value)*1000;
  const useRandom=document.getElementById('toggle-random').classList.contains('on');
  const useVib=document.getElementById('toggle-vibration').classList.contains('on');
  let totalTime=reactionDuration*60, changes=0, lastIdx=-1;
  const display=document.getElementById('reaction-display');

  function getInt() {
    if(!useRandom) return baseInt;
    return Math.max(500,baseInt*0.4)+Math.random()*(baseInt*1.8-Math.max(500,baseInt*0.4));
  }
  function next() {
    if(reactionPaused){const t=setTimeout(next,500);reactionTimers.push(t);return;}
    let idx; do{idx=selectedColors[Math.floor(Math.random()*selectedColors.length)];}while(idx===lastIdx&&selectedColors.length>1);
    lastIdx=idx;
    const c=COLORS[idx]; display.style.backgroundColor=c.hex;
    document.getElementById('reaction-content').innerHTML=`<div class="reaction-color-name">${c.name}</div>`;
    changes++; document.getElementById('r-changes').textContent=changes;
    if(reactionSoundOn) beepColor(); if(useVib) vibrate(150); speak(c.name);
    const t=setTimeout(next,getInt()); reactionTimers.push(t);
  }
  const timerIv=setInterval(()=>{
    if(reactionPaused) return; totalTime--;
    document.getElementById('r-time').textContent=fmtTime(totalTime);
    if(totalTime<=0){
      beepDone(); vibrate([300,100,300,100,300]);
      showSummary('¡ENTRENAMIENTO COMPLETO!',[{label:'CAMBIOS DE COLOR',value:changes},{label:'DURACIÓN',value:fmtTime(reactionDuration*60)},{label:'COLORES USADOS',value:selectedColors.length}]);
      stopReaction();
    }
  },1000);
  reactionTimers.push(timerIv);
  next();
}

function togglePauseReaction() {
  reactionPaused=!reactionPaused;
  const b=document.getElementById('btn-reaction-pause');
  b.textContent=reactionPaused?'REANUDAR':'PAUSA'; b.classList.toggle('paused',reactionPaused);
  if(reactionPaused){document.getElementById('reaction-content').innerHTML='<div class="reaction-waiting">PAUSADO</div>';document.getElementById('reaction-display').style.backgroundColor='#1a1a26';}
}

function stopReaction() {
  reactionTimers.forEach(t=>{clearTimeout(t);clearInterval(t);}); reactionTimers=[];
  reactionPaused=false; speechSynthesis.cancel();
  document.getElementById('reaction-config').style.display='flex';
  const d=document.getElementById('reaction-display'); d.classList.remove('active'); d.style.backgroundColor='';
}

// INIT
buildColorGrid(); updateTotalTime();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
let wakeLock=null;
async function reqWake(){try{if('wakeLock' in navigator)wakeLock=await navigator.wakeLock.request('screen');}catch(e){}}
reqWake(); document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')reqWake();});
</script>
